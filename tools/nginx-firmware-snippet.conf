# Append to /etc/nginx/conf.d/water-the-flowers-proxy.conf inside the same
# server { ... } block that already handles /v1/telegram/ and /v1/metrics/.
#
# Replace EXPECTED_TOKEN_HERE with the same bearer token the metrics + telegram
# proxies already check (METRICS_PROXY_AUTH_TOKEN / TELEGRAM_PROXY_AUTH_TOKEN).
# Reload with: sudo nginx -t && sudo systemctl reload nginx
#
# The firmware tree on disk:
#   /var/www/firmware/manifest.json          (current pointer, generated by tools/publish-firmware.sh)
#   /var/www/firmware/firmware-1.2.0.bin     (historical binaries)
#   /var/www/firmware/firmware-1.1.1.bin

location /v1/firmware/ {
    # Bearer-token check, same pattern as the metrics/telegram locations.
    if ($http_authorization != "Bearer EXPECTED_TOKEN_HERE") {
        return 401;
    }
    alias /var/www/firmware/;
    autoindex off;
    add_header Cache-Control "no-store" always;
    types {
        application/octet-stream bin;
        application/json         json;
    }
    default_type application/octet-stream;
}
