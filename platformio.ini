; PlatformIO Project Configuration File
; Mini fork — single zone, single firmware env

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_rtscts = false
upload_speed = 921600

lib_deps =
    ArduinoJson @ ^6.21.0

board_build.filesystem = littlefs
board_build.partitions = partitions_16mb.csv
board_build.f_cpu = 240000000L

; YD-ESP32-23 v1.3 is N16R8 (16 MB flash, 8 MB octal PSRAM). The base
; esp32-s3-devkitc-1 board declaration assumes 8 MB; override here so
; esptool sets the right --flash_size and the bootloader knows about
; octal PSRAM.
board_upload.flash_size       = 16MB
board_build.flash_size        = 16MB
board_build.arduino.memory_type = qio_opi
board_build.flash_mode        = qio

monitor_filters =
    time
    log2file
    default
    esp32_exception_decoder

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM

; ============================================
; OTA HARDWARE-IN-THE-LOOP TEST ENVIRONMENT
; ============================================
; Same firmware as the production env above, but METRICS_PROXY_BASE_URL is
; redirected to a local Python server (tools/ota_test_server.py) so OTA
; manifest/binary fetches stay on the LAN. Telegram traffic still uses the
; prod Cloud.ru proxy (TELEGRAM_PROXY_BASE_URL is unchanged in secret.h).
;
; The override must be passed via -D so config.h's `#ifndef
; METRICS_PROXY_BASE_URL` block doesn't fall back to TELEGRAM_PROXY_BASE_URL.
;
; Build: pio run -e esp32-s3-ota-test
; Flash: pio run -e esp32-s3-ota-test -t upload
[env:esp32-s3-ota-test]
extends = env:esp32-s3-devkitc-1
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    '-DMETRICS_PROXY_BASE_URL="http://192.168.100.18:8765"'

; ============================================
; NATIVE UNIT TEST ENVIRONMENT (pure logic, ArduinoFake)
; ============================================
; Runs the 42 unit tests in test/test_unit/test_*.cpp. test_filter
; selects only the test_unit suite so this env doesn't try to compile
; esp32-pio-emulator tests against ArduinoFake's Arduino.h (the two
; fake libs collide).
[env:native]
platform = native
test_framework = unity
test_filter = test_unit
lib_deps =
    fabiobatsilva/ArduinoFake @ ^0.3.1
    bblanchon/ArduinoJson @ ^6.21.0
build_flags =
    -D NATIVE_TEST
    -D ARDUINOJSON_ENABLE_ARDUINO_STRING=1
    -std=gnu++17

; ============================================
; ESP32-PIO-EMULATOR (behavioral simulator)
; ============================================
; Compiles tests against a host-side fake of the ESP32 HAL. Lets us run
; setup()/loop() natively and assert on observable behavior (pin levels,
; UART output, virtual time) plus the framework's strict-mode chip-
; contract checks.
;
; Distinct from [env:native] above (which uses ArduinoFake for pure-
; logic tests). Both suites share the default test_dir = test, so the
; two trees coexist as siblings:
;   test/test_unit/test_*.cpp — ArduinoFake (native env)
;   test/sim/test_sim_*/      — esp32-pio-emulator (native-sim env)
; test_filter in each env prevents cross-compilation. (PIO 6.1.18 only
; discovers test suites in subdirs named test_*, so the native tests
; live under test/test_unit/ rather than as loose test/test_*.cpp.)
;
; test_build_src = false: src/main.cpp pulls WebServer / mDNS /
; LittleFS, which the simulator doesn't fake. Each sim test file
; provides its own minimal setup()/loop().
[env:native-sim]
platform = native
test_framework = unity
lib_compat_mode = off
test_build_src = false
test_filter = sim/*
lib_deps =
    https://github.com/fresh-fx59/esp32-pio-emulator
build_flags =
    -std=gnu++17
